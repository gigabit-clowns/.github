name: "Run CMake tests (internal)"
description: "Runs CMake tests for every OS. Intended for internal use only."

inputs:
  test-wrapper:
    description: "Wrapper command to run tests (e.g. OpenCppCoverage). Will be ignored if used with check-memleak."
    required: false
    default: ""
  test-extra-params:
    description: "Extra params and/or commands that can be added at the right of the ctest call. Will be ignored if used with check-memleak."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Evaluate inputs
      id: evaluate-inputs
      shell: bash
      env:
        TEST_WRAPPER: ${{ inputs.test-wrapper }}
        TEST_EXTRA_PARAMS: ${{ inputs.test-extra-params }}
      run: |
        echo "test-wrapper=$TEST_WRAPPER" >> $GITHUB_OUTPUT
        echo "test-extra-params=$TEST_EXTRA_PARAMS" >> $GITHUB_OUTPUT 

    - name: Run tests without memory check
      working-directory: "${{ github.workspace }}/build"
      shell: ${{ runner.os == 'Windows' && 'cmd' || 'bash' }}
      run: ${{ steps.evaluate-inputs.outputs.test-wrapper }} ctest -C ${{ env.BUILD_TYPE }} --rerun-failed --output-on-failure ${{ steps.evaluate-inputs.outputs.test-extra-params }}
